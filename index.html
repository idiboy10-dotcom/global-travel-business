<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Global Travel Business</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Nos Destinations</h1>
    <div class="row">

      <!-- Carte Gorée -->
      <div class="col-md-4">
        <div class="card">
          <img src="goree.jpg" alt="Île de Gorée" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Île de Gorée</h5>
            <p class="card-text">Découvrez l’histoire et la beauté de Gorée.</p>
          </div>
        </div>
      </div>

      <!-- Carte Kenya -->
      <div class="col-md-4">
        <div class="card">
          <img src="kenya.jpg" alt="Safari au Kenya" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Safari au Kenya</h5>
            <p class="card-text">Vivez l’aventure au cœur de la savane.</p>
          </div>
        </div>
      </div>

      <!-- Carte Paris -->
      <div class="col-md-4">
        <div class="card">
          <img src="paris.jpg" alt="Paris" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">Paris</h5>
            <p class="card-text">Explorez la Ville Lumière et ses monuments.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
